seed: 24
__set_seed: !apply:deeplab.utils.misc.set_random_seed [!ref <seed>]

use_amp: true
use_gradient_clipping: true
gradient_accumulation: 1
cudnn_benchmark: false

optimizer: !name:torch.optim.AdamW
    lr: 0.00001
    weight_decay: 0.0001

scheduler_lmft: !name:deeplab.core.scheduler.WarmupCosineScheduler
    min_lr: 0.000005
    max_lr: 0.00001
    warmup_epoch: 0
    fix_epoch: 2

num_epochs: 4
max_iters_per_epoch: null
batch_size: 64
valid_batch_size: 1
training_loop: 1
num_workers: 16
output_dir: results/

items_save: true
item_save_steps: 1000

dur_range: [2, 3]
max_valid_dur: 60
speed_perturbation: [0.9, 1.1]
data_aug: true
embd_dim: 256

sample_rate: 16000

corpus_dir: ../../data/AudioData

musan_path: !apply:os.path.join [!ref <corpus_dir>, 'musan'] 
rirs_path:  !apply:os.path.join [!ref <corpus_dir>, 'rirs_noise'] 

train_data:
    - !name:deeplab.utils.corpus.load_audio_corpus
        ['../../data/vox2dev', ['dev']] # 5994


valid_data:
    - scp_path: '../../data/test_vox/vox1-o/wav_copy.scp'
      trial_path: '../../data/test_vox/vox1-o/trials'


peft_config: null

spk_model: !new:local.spk_model.Audio2Vec_based_Adapter
    model_name: 'facebook/w2v-bert-2.0'
    frozen_encoder: false
    bnb_config: null
    peft_config: !ref <peft_config>
    encoder_config: 'config_prune_stu_0.8.json' # replace this with your pruned w2v-bert 2.0 config
    n_mfa_layers: -1
    pooling_layer: 'ASP' 
    embd_dim: !ref <embd_dim> 
    adapter_dim: 128
    dropout: 0.0


classifier: !new:local.spk_classifier.ArcFace
    in_features: !ref <embd_dim>
    out_features:  17982
    s: 32
    m: 0.2

modules: 
    spk_model: !ref <spk_model>
    classifier: !ref <classifier>